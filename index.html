<style>
#password-gate {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a0e27 0%, #1a1040 50%, #0d1538 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
#password-gate .gate-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 40px 36px;
  text-align: center;
  backdrop-filter: blur(10px);
  max-width: 360px;
  width: 90%;
}
#password-gate .gate-title {
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}
#password-gate .gate-subtitle {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  margin-bottom: 28px;
}
#password-gate .gate-input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 15px;
  outline: none;
  box-sizing: border-box;
  transition: border-color 0.3s;
}
#password-gate .gate-input:focus {
  border-color: rgba(99, 102, 241, 0.6);
}
#password-gate .gate-input::placeholder {
  color: rgba(255,255,255,0.3);
}
#password-gate .gate-btn {
  width: 100%;
  padding: 12px;
  margin-top: 16px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.3s;
}
#password-gate .gate-btn:hover {
  opacity: 0.9;
}
#password-gate .gate-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
#password-gate .gate-error {
  color: #f87171;
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
}
#password-gate .footer-text {
  color: rgba(255,255,255,0.3);

}

  display: none;

</style>
</head>
<body>
<div id="password-gate">
  <div class="gate-box">
    <div class="gate-title">先锋智算</div>
    <div class="gate-subtitle">超级概率分析系统 · 请输入访问密码</div>
    <input type="password" class="gate-input" id="gate-password" placeholder="请输入密码" autocomplete="off" />
    <button class="gate-btn" id="gate-submit">验证进入</button>
    <div class="gate-error" id="gate-error"></div>
    <div class="footer-text">仅供授权用户使用</div>
  </div>
</div>
<div id="app"></div>

<script>
(function() {
  var STORAGE_KEY = '__xfzs_auth__';
  var VALID_HASH = '9be3e427e098a0c15a2226cfea929653';

  function simpleHash(str) {
    var hash = 0;
    for (var i = 0; i < str.length; i++) {
      var char = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
    }
    var u = (hash >>> 0);
    var h = u.toString(16);
    while (h.length < 8) h = '0' + h;
    var h2 = ((u * 31 + str.length) >>> 0).toString(16);
    while (h2.length < 8) h2 = '0' + h2;
    var h3 = ((u * 17 + str.length * 7) >>> 0).toString(16);
    while (h3.length < 8) h3 = '0' + h3;
    var h4 = ((u * 13 + str.length * 11) >>> 0).toString(16);
    while (h4.length < 8) h4 = '0' + h4;
    return h + h2 + h3 + h4;
  }

  function checkAuth() {
    try {
      return localStorage.getItem(STORAGE_KEY) === VALID_HASH;
    } catch(e) {
      return false;
    }
  }

  function setAuth() {
    try {
      localStorage.setItem(STORAGE_KEY, VALID_HASH);
    } catch(e) {}
  }

  if (checkAuth()) {
    document.body.className = 'auth-ok';
  }

  document.getElementById('gate-submit').addEventListener('click', function() {
    var input = document.getElementById('gate-password');
    var error = document.getElementById('gate-error');
    var btn = document.getElementById('gate-submit');
    var pwd = input.value.trim();

    if (!pwd) {
      error.textContent = '请输入密码';
      return;
    }

    btn.disabled = true;
    btn.textContent = '验证中...';

    var hash = simpleHash(pwd);
    if (hash === VALID_HASH) {
      setAuth();
      document.body.className = 'auth-ok';
    } else {
      error.textContent = '密码错误，请重试';
      btn.disabled = false;
      btn.textContent = '验证进入';
      input.value = '';
      input.focus();
    }
  });

  document.getElementById('gate-password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('gate-submit').click();
    }
  });
})();
</script>
</body>
