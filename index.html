<body>
  <div id="password-gate">
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
    <div class="card">
      <span class="logo-icon">🎯</span>
      <span class="title">先锋智算</span>
      <span class="subtitle">彩票概率分析系统</span>
      <div class="divider"></div>
      <span class="label">请输入访问密码</span>
      <div class="input-wrapper">
        <input class="pwd-input" type="password" id="pwd-input" placeholder="请输入密码" autocomplete="off" />
      </div>
      <div class="error-msg" id="error-msg"></div>
      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">进入系统</button>
      <div class="footer-text">受保护的系统 · 仅限授权访问</div>
    </div>
  </div>
  <div id="app"></div>

  <script>
    var STORAGE_KEY = '__xfzs_auth__';
    var VALID_HASH = '9be3e427e098a0c15a2226cfea929653';

    function simpleHash(str) {
      var hash = 0;
      for (var i = 0; i < str.length; i++) {
        var char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
      }
      var u = (hash >>> 0);
      var h = u.toString(16);
      while (h.length < 8) h = '0' + h;
      var h2 = ((u * 31 + str.length) >>> 0).toString(16);
      while (h2.length < 8) h2 = '0' + h2;
      var h3 = ((u * 17 + str.length * 7) >>> 0).toString(16);
      while (h3.length < 8) h3 = '0' + h3;
      var h4 = ((u * 13 + str.length * 11) >>> 0).toString(16);
      while (h4.length < 8) h4 = '0' + h4;
      return h + h2 + h3 + h4;
    }

    function checkAuth() {
      try {
        var stored = localStorage.getItem(STORAGE_KEY);
        return stored === VALID_HASH;
      } catch(e) {
        return false;
      }
    }

    function handleSubmit() {
      var input = document.getElementById('pwd-input');
      var errorEl = document.getElementById('error-msg');
      var btn = document.getElementById('submit-btn');
      var pwd = input.value.trim();

      if (!pwd) {
        errorEl.textContent = '请输入访问密码';
        return;
      }

      btn.classList.add('loading');
      btn.textContent = '验证中...';

      setTimeout(function() {
        var hash = simpleHash(pwd);
        if (hash === VALID_HASH) {
          try {
            localStorage.setItem(STORAGE_KEY, hash);
          } catch(e) {}
          document.body.classList.add('auth-ok');
        } else {
          errorEl.textContent = '密码错误，请重试';
          input.value = '';
          btn.classList.remove('loading');
          btn.textContent = '进入系统';
        }
      }, 300);
    }

    document.getElementById('pwd-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSubmit();
    });

    if (checkAuth()) {
      document.body.classList.add('auth-ok');
    }
  </script>
</body>
